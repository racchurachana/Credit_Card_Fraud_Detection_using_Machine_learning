{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Credit Card Fraud Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --card: #191c25;
      --card-border: #252933;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.12);
      --accent-hover: #60a5fa;
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.10);
      --success: #22c55e;
      --success-dim: rgba(34,197,94,0.10);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }
    nav.ccfd-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
    }
    .ccfd-logo {
      font-family: var(--mono); font-weight: 600; font-size: 14px;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-mark {
      width: 32px; height: 32px;
      border: 1.5px solid var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { display: flex; flex-direction: column; gap: 2px; }
    .logo-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1; }
    .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; line-height: 1; letter-spacing: 0.08em; text-transform: uppercase; }
    .ccfd-nav-links { display: flex; align-items: center; gap: 4px; }
    .ccfd-nav-links a {
      color: var(--text-muted); text-decoration: none; font-size: 13px;
      font-weight: 500; padding: 7px 14px; border-radius: 6px; transition: all 0.15s;
    }
    .ccfd-nav-links a:hover { color: var(--text); background: var(--card); }
    .ccfd-nav-links a.nav-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .ccfd-nav-links a.nav-primary:hover { background: var(--accent-hover); color: #fff; }
    .nav-user-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px; background: var(--card);
      border: 1px solid var(--card-border); border-radius: 20px;
      font-size: 12px; color: var(--text-secondary); font-family: var(--mono);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ccfd-main { position: relative; z-index: 1; padding-top: 64px; min-height: 100vh; }

    /* Card */
    .ccfd-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 32px; }

    /* Form */
    .form-label-sm {
      display: block; font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px;
    }
    .form-control-ccfd {
      width: 100%; background: var(--surface); border: 1px solid var(--card-border);
      border-radius: 6px; padding: 10px 14px; color: var(--text);
      font-family: var(--sans); font-size: 14px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none;
    }
    .form-control-ccfd:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .form-control-ccfd::placeholder { color: var(--text-muted); }
    select.form-control-ccfd { cursor: pointer; }
    select.form-control-ccfd option { background: var(--surface); }

    /* Buttons */
    .btn-ccfd {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 28px; border-radius: 6px; font-family: var(--sans);
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s; text-decoration: none;
    }
    .btn-primary-ccfd { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary-ccfd:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.3); }
    .btn-outline-ccfd { background: transparent; border: 1px solid var(--card-border); color: var(--text-secondary); }
    .btn-outline-ccfd:hover { border-color: var(--accent); color: var(--accent); }

    /* Badges */
    .badge-ccfd {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 4px; font-family: var(--mono);
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .badge-safe { background: var(--success-dim); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .badge-fraud { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

    /* Alert */
    .alert-ccfd {
      padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px;
      background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger); font-family: var(--mono);
    }

    /* Divider */
    .sp-divider { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 12px; margin: 20px 0; font-family: var(--mono); }
    .sp-divider::before, .sp-divider::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

    /* Section label */
    .section-divider {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 12px; margin: 28px 0 18px;
    }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

    h1,h2,h3,h4,h5 { font-family: var(--sans); font-weight: 700; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.4s ease forwards; }
    .fade-in-2 { animation: fadeUp 0.4s 0.08s ease both; }
    .fade-in-3 { animation: fadeUp 0.4s 0.16s ease both; }
    .fade-in-4 { animation: fadeUp 0.4s 0.24s ease both; }
  </style>
</head>
<body>

<nav class="ccfd-nav">
  <a href="/" class="ccfd-logo">
    <span class="logo-mark">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
    </span>
    <span class="logo-text">
      <span class="logo-title">Credit Card Fraud Detection</span>
      <span class="logo-sub">ML Security System</span>
    </span>
  </a>

  <div class="ccfd-nav-links">
    <a href="/">Home</a>
    {% if user.is_authenticated %}
      <span class="nav-user-pill">
        <span class="status-dot"></span>
        {{user.username}}
      </span>
      <a href="/data">Predict</a>
      <a href="/logout" class="nav-primary">Logout</a>
    {% else %}
      <a href="/register">Register</a>
      <a href="/login">Login</a>
      <a href="/adminlogin" class="nav-primary">Admin</a>
    {% endif %}
  </div>
</nav>

<div class="ccfd-main">
  {% block content %}{% endblock %}
</div>

<script src="{% static 'js/jquery.min.js' %}"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
